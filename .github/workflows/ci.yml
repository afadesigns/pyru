name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Python + Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.6 mypy==1.14.1
      - run: ruff check .
      - run: ruff format --check .
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_scraper
      - run: cargo fmt --manifest-path rust_scraper/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path rust_scraper/Cargo.toml --all-targets -- -D warnings

  test:
    name: Tests (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_scraper
      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build native extension
        run: maturin develop --release
      - name: Python tests
        run: pytest
      - name: Mypy
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: mypy

  rust-tests:
    name: Rust tests + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_scraper
      - name: Cargo test
        run: cargo test --manifest-path rust_scraper/Cargo.toml --all-targets
      - name: Cargo deny check (advisories)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust_scraper/Cargo.toml
          command: check advisories bans sources

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  docker:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    needs: [lint, test, rust-tests]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pyru:ci
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: pyru:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
