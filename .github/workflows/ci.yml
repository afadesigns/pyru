name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_scraper
      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.6 mypy==1.14.1
      - run: ruff check .
      - run: ruff format --check .
      - run: cargo fmt --manifest-path rust_scraper/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path rust_scraper/Cargo.toml --all-targets -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.15.0-alpha.8"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_scraper
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov mypy
      - name: Build and install pyweb-scraper (release)
        run: pip install --verbose .
      - run: pytest
      - name: Mypy (primary leg only)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: mypy

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_scraper
      - run: cargo test --manifest-path rust_scraper/Cargo.toml --all-targets
      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust_scraper/Cargo.toml
          command: check advisories bans sources

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, rust-tests]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: pyru:ci
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: pyru:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
