name: OpenSSF Scorecard

on:
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

# NOTE: no top-level `env:` here — ossf/scorecard-action refuses workflows
# that declare global env vars or defaults (it rejects as "workflow
# verification failed"). Any Node 24 opt-in must be per-step.

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
